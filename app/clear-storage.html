<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除存储</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f5f2;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        button {
            background-color: #f59e0b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background-color: #d97706;
        }
        .success {
            color: #10b981;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>清除存储</h1>
        <p>点击下面的按钮清除应用存储，然后重新加载应用页面以测试LLM生成。</p>
        <button onclick="clearStorage()">清除存储</button>
        <button onclick="window.location.href='http://localhost:5173'">返回应用</button>
        <div id="message" class="success" style="display: none;">
            存储已清除！请返回应用页面。
        </div>
    </div>
    <script>
        function clearStorage() {
            localStorage.removeItem('love-yourself-app-state');
            document.getElementById('message').style.display = 'block';
        }
    </script>
</body>
</html>
